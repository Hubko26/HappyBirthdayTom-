<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* ---- START SCREEN ---- */
  .start-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 50;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 24px;
    transition: opacity 0.5s;
  }

  .start-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .start-screen h1 {
    font-size: 3rem;
    letter-spacing: 3px;
    color: #e94560;
  }

  .start-screen .preview {
    max-width: 50vw;
    max-height: 35vh;
    border-radius: 12px;
    border: 3px solid #e94560;
    object-fit: contain;
  }

  .start-screen .form-row {
    display: flex;
    gap: 14px;
    align-items: center;
    font-size: 1.2rem;
  }

  .start-screen input[type="number"] {
    width: 80px;
    padding: 8px 12px;
    border: 2px solid #e94560;
    border-radius: 8px;
    background: #16213e;
    color: #eee;
    font-size: 1.2rem;
    text-align: center;
  }

  .start-screen .play-btn {
    padding: 14px 48px;
    border: none;
    border-radius: 10px;
    background: #e94560;
    color: #fff;
    font-size: 1.4rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 1px;
  }

  .start-screen .play-btn:hover { background: #c73550; transform: scale(1.03); }

  .start-screen .hint {
    color: #888;
    font-size: 0.9rem;
  }

  /* ---- GAME ---- */
  .game-wrapper {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: 100vh;
  }

  .game-wrapper.active { display: flex; }

  .game-header {
    display: flex;
    align-items: center;
    gap: 18px;
    margin: 10px 0 6px;
  }

  .game-header h2 { font-size: 1.3rem; letter-spacing: 1px; }

  .game-header button {
    padding: 6px 18px;
    border: 2px solid #e94560;
    border-radius: 6px;
    background: transparent;
    color: #e94560;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .game-header button:hover { background: #e94560; color: #fff; }

  .status {
    font-size: 1rem;
    min-height: 24px;
    text-align: center;
    color: #aaa;
    margin-bottom: 4px;
  }

  #puzzle-canvas {
    display: block;
    cursor: grab;
  }

  #puzzle-canvas:active { cursor: grabbing; }

  .reveal-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
    background: #1a1a2e;
  }

  .reveal-container.active { display: flex; }

  .reveal-container img {
    max-width: 90vw;
    max-height: 85vh;
    border-radius: 12px;
    border: 3px solid #e94560;
    opacity: 0;
  }

  #reveal-puzzle {
    transition: opacity 0.6s ease-in;
  }

  #reveal-final {
    transition: opacity 4s ease-in-out;
  }

  .reveal-container img.visible { opacity: 1; }

  #fireworks-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 200;
    display: none;
  }
</style>
</head>
<body>

<!-- START SCREEN -->
<div class="start-screen" id="start-screen">
  <h1>Puzzle Game</h1>
  <img class="preview" src="/static/puzzle.png" alt="Preview">
  <div class="form-row">
    <label for="piece-count">Number of pieces:</label>
    <input type="number" id="piece-count" min="4" max="100" value="60">
  </div>
  <div class="hint" id="grid-hint">10 x 6 = 60 pieces</div>
  <button class="play-btn" id="play-btn">Play</button>
</div>

<!-- GAME SCREEN -->
<div class="game-wrapper" id="game-wrapper">
  <div class="game-header">
    <h2 id="piece-info"></h2>
    <button id="restart-btn">New Game</button>
  </div>
  <div class="status" id="status"></div>
  <canvas id="puzzle-canvas"></canvas>
</div>

<canvas id="fireworks-canvas"></canvas>

<div class="reveal-container" id="reveal">
  <img id="reveal-puzzle" src="/static/puzzle.png" alt="Puzzle">
  <img id="reveal-final" src="/static/reveal.png" alt="Reveal" style="position:absolute;">
</div>

<script>
const PUZZLE_IMG_SRC = "/static/puzzle.png";
const REVEAL_IMG_SRC = "/static/reveal.png";

const canvas = document.getElementById("puzzle-canvas");
const ctx = canvas.getContext("2d");
const playBtn = document.getElementById("play-btn");
const restartBtn = document.getElementById("restart-btn");
const pieceCountInput = document.getElementById("piece-count");
const statusEl = document.getElementById("status");
const pieceInfoEl = document.getElementById("piece-info");
const gridHintEl = document.getElementById("grid-hint");
const startScreen = document.getElementById("start-screen");
const gameWrapper = document.getElementById("game-wrapper");

let pieces = [];
let groups = [];  // each group = array of piece ids
let groupMap = {}; // pieceId -> groupIndex
let cols = 0, rows = 0;
let pieceW = 0, pieceH = 0;
let draggingGroup = null;
let offsetX = 0, offsetY = 0;
let solved = false;
let puzzleImg = null;

const MARGIN = 200;
const PUZZLE_W = 900;
const PUZZLE_H = 600;
let CANVAS_W = PUZZLE_W + MARGIN * 2;
let CANVAS_H = PUZZLE_H + MARGIN * 2;
const FRAME_X = MARGIN;
const FRAME_Y = MARGIN;

function computeGrid(n) {
  const ratio = PUZZLE_W / PUZZLE_H;
  let bestCols = 1, bestRows = n;
  for (let c = 1; c <= n; c++) {
    if (n % c === 0) {
      const r = n / c;
      if (Math.abs(c / r - ratio) < Math.abs(bestCols / bestRows - ratio)) {
        bestCols = c;
        bestRows = r;
      }
    }
  }
  return { cols: bestCols, rows: bestRows };
}

function snapToValid(n) {
  if (n < 4) return 4;
  if (n > 100) return 100;
  for (let i = n; i <= 100; i++) {
    const g = computeGrid(i);
    if (g.cols > 1 && g.rows > 1) return i;
  }
  return 16;
}

// live grid hint on start screen
pieceCountInput.addEventListener("input", () => {
  let n = parseInt(pieceCountInput.value) || 4;
  n = snapToValid(n);
  const g = computeGrid(n);
  gridHintEl.textContent = `${g.cols} x ${g.rows} = ${n} pieces`;
});

function getPieceById(id) {
  return pieces.find(p => p.id === id);
}

function getGroupPieces(groupIdx) {
  return groups[groupIdx].map(id => getPieceById(id));
}

function gridNeighbors(id) {
  const r = Math.floor(id / cols);
  const c = id % cols;
  const neighbors = [];
  if (c > 0) neighbors.push(id - 1);
  if (c < cols - 1) neighbors.push(id + 1);
  if (r > 0) neighbors.push(id - cols);
  if (r < rows - 1) neighbors.push(id + cols);
  return neighbors;
}

function mergeGroups(gA, gB) {
  if (gA === gB) return;
  const piecesB = groups[gB];
  for (const id of piecesB) {
    groupMap[id] = gA;
  }
  groups[gA] = groups[gA].concat(piecesB);
  groups[gB] = [];
}

function tryMergeNeighbors(groupIdx) {
  const memberIds = [...groups[groupIdx]];
  for (const id of memberIds) {
    const p = getPieceById(id);
    for (const nid of gridNeighbors(id)) {
      const ng = groupMap[nid];
      if (ng === groupIdx) continue;
      const np = getPieceById(nid);

      // check if relative positions match what they should be in the grid
      const expectedDx = np.correctX - p.correctX;
      const expectedDy = np.correctY - p.correctY;
      const actualDx = np.x - p.x;
      const actualDy = np.y - p.y;
      const threshold = Math.min(pieceW, pieceH) * 0.3;

      if (Math.abs(actualDx - expectedDx) < threshold && Math.abs(actualDy - expectedDy) < threshold) {
        // snap neighbor group to align perfectly
        const refP = p;
        const offset_x = (refP.x + expectedDx) - np.x;
        const offset_y = (refP.y + expectedDy) - np.y;
        const neighborPieces = getGroupPieces(ng);
        for (const nbp of neighborPieces) {
          nbp.x += offset_x;
          nbp.y += offset_y;
        }
        mergeGroups(groupIdx, ng);
      }
    }
  }
}

function trySnapGroupToFrame(groupIdx) {
  const memberPieces = getGroupPieces(groupIdx);
  if (memberPieces.length === 0) return;

  const first = memberPieces[0];
  const targetX = FRAME_X + first.correctX;
  const targetY = FRAME_Y + first.correctY;
  const dx = targetX - first.x;
  const dy = targetY - first.y;
  const threshold = Math.min(pieceW, pieceH) * 0.35;

  if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) {
    for (const p of memberPieces) {
      p.x = FRAME_X + p.correctX;
      p.y = FRAME_Y + p.correctY;
      p.placed = true;
    }
  }
}

function scatterPieces() {
  const positions = [];
  const pad = 8;

  for (const p of pieces) {
    let x, y, attempts = 0;
    do {
      // pick random side: 0=top, 1=bottom, 2=left, 3=right
      const side = Math.floor(Math.random() * 4);
      switch (side) {
        case 0: // top margin
          x = pad + Math.random() * (CANVAS_W - pieceW - pad * 2);
          y = pad + Math.random() * (MARGIN - pieceH - pad * 2);
          break;
        case 1: // bottom margin
          x = pad + Math.random() * (CANVAS_W - pieceW - pad * 2);
          y = FRAME_Y + PUZZLE_H + pad + Math.random() * (MARGIN - pieceH - pad * 2);
          break;
        case 2: // left margin
          x = pad + Math.random() * (MARGIN - pieceW - pad * 2);
          y = pad + Math.random() * (CANVAS_H - pieceH - pad * 2);
          break;
        case 3: // right margin
          x = FRAME_X + PUZZLE_W + pad + Math.random() * (MARGIN - pieceW - pad * 2);
          y = pad + Math.random() * (CANVAS_H - pieceH - pad * 2);
          break;
      }
      attempts++;
    } while (attempts < 50 && positions.some(pos =>
      Math.abs(pos.x - x) < pieceW * 0.5 && Math.abs(pos.y - y) < pieceH * 0.5
    ));

    x = Math.max(pad, Math.min(CANVAS_W - pieceW - pad, x));
    y = Math.max(pad, Math.min(CANVAS_H - pieceH - pad, y));

    p.x = x;
    p.y = y;
    positions.push({ x, y });
  }
}

function initPuzzle() {
  solved = false;
  let count = parseInt(pieceCountInput.value) || 16;
  count = snapToValid(count);
  pieceCountInput.value = count;

  const grid = computeGrid(count);
  cols = grid.cols;
  rows = grid.rows;
  pieceW = PUZZLE_W / cols;
  pieceH = PUZZLE_H / rows;

  pieceInfoEl.textContent = `${cols} x ${rows} = ${count} pieces`;

  pieces = [];
  groups = [];
  groupMap = {};

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const id = r * cols + c;
      pieces.push({
        id,
        srcX: c * pieceW,
        srcY: r * pieceH,
        x: 0,
        y: 0,
        correctX: c * pieceW,
        correctY: r * pieceH,
        placed: false
      });
      groups.push([id]);
      groupMap[id] = id;
    }
  }

  scatterPieces();

  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  canvas.style.maxWidth = "98vw";
  canvas.style.maxHeight = "92vh";
  canvas.style.height = "auto";

  statusEl.textContent = "Drag pieces into the frame. Matching neighbors lock together!";
  draw();
}

function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // background
  ctx.fillStyle = "#111827";
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // puzzle frame
  ctx.fillStyle = "#0f3460";
  ctx.fillRect(FRAME_X, FRAME_Y, PUZZLE_W, PUZZLE_H);

  // frame border
  ctx.strokeStyle = "#e94560";
  ctx.lineWidth = 3;
  ctx.strokeRect(FRAME_X, FRAME_Y, PUZZLE_W, PUZZLE_H);

  // grid hints inside frame
  ctx.strokeStyle = "rgba(255,255,255,0.07)";
  ctx.lineWidth = 1;
  for (let c = 1; c < cols; c++) {
    ctx.beginPath();
    ctx.moveTo(FRAME_X + c * pieceW, FRAME_Y);
    ctx.lineTo(FRAME_X + c * pieceW, FRAME_Y + PUZZLE_H);
    ctx.stroke();
  }
  for (let r = 1; r < rows; r++) {
    ctx.beginPath();
    ctx.moveTo(FRAME_X, FRAME_Y + r * pieceH);
    ctx.lineTo(FRAME_X + PUZZLE_W, FRAME_Y + r * pieceH);
    ctx.stroke();
  }

  // draw pieces: placed first, then unplaced, dragging group last
  const draggingIds = draggingGroup !== null ? new Set(groups[draggingGroup]) : new Set();

  const placedPieces = pieces.filter(p => p.placed && !draggingIds.has(p.id));
  const unplacedPieces = pieces.filter(p => !p.placed && !draggingIds.has(p.id));
  const dragPieces = draggingGroup !== null ? getGroupPieces(draggingGroup) : [];

  for (const p of placedPieces) drawPiece(p);
  for (const p of unplacedPieces) drawPiece(p);
  for (const p of dragPieces) drawPiece(p);
}

function drawPiece(p) {
  ctx.save();

  const groupSize = groups[groupMap[p.id]].length;
  if (p.placed) {
    ctx.strokeStyle = "rgba(0,255,100,0.5)";
  } else if (groupSize > 1) {
    ctx.strokeStyle = "rgba(100,180,255,0.7)";
  } else {
    ctx.strokeStyle = "rgba(233,69,96,0.5)";
  }
  ctx.lineWidth = 2;
  ctx.strokeRect(p.x, p.y, pieceW, pieceH);

  ctx.drawImage(
    puzzleImg,
    p.srcX, p.srcY, pieceW, pieceH,
    p.x, p.y, pieceW, pieceH
  );

  ctx.restore();
}

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  const scaleY = CANVAS_H / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

function hitTest(mx, my) {
  for (let i = pieces.length - 1; i >= 0; i--) {
    const p = pieces[i];
    if (p.placed) continue;
    if (mx >= p.x && mx <= p.x + pieceW && my >= p.y && my <= p.y + pieceH) {
      return p;
    }
  }
  return null;
}

function startDrag(pos) {
  if (solved) return;
  const hit = hitTest(pos.x, pos.y);
  if (!hit) return;

  const gIdx = groupMap[hit.id];
  draggingGroup = gIdx;
  offsetX = pos.x - hit.x;
  offsetY = pos.y - hit.y;

  // move all pieces in group to end of array (render on top)
  const gPieceIds = new Set(groups[gIdx]);
  const others = pieces.filter(p => !gPieceIds.has(p.id));
  const dragParts = pieces.filter(p => gPieceIds.has(p.id));
  pieces.length = 0;
  pieces.push(...others, ...dragParts);
}

function moveDrag(pos) {
  if (draggingGroup === null) return;

  const gPieces = getGroupPieces(draggingGroup);
  const anchor = gPieces[0];
  const newAnchorX = pos.x - offsetX;
  const newAnchorY = pos.y - offsetY;
  const dx = newAnchorX - anchor.x;
  const dy = newAnchorY - anchor.y;

  // need to compute offset relative to the piece that was clicked, not anchor
  // find the piece closest to where we grabbed
  // simpler: store anchor offset at drag start
  for (const p of gPieces) {
    p.x += dx;
    p.y += dy;
  }

  draw();
}

function endDrag() {
  if (draggingGroup === null) return;
  const gIdx = draggingGroup;
  draggingGroup = null;

  // try merge with neighbors
  tryMergeNeighbors(gIdx);

  // the group might have changed index after merge, find current group of first member
  const currentGroup = groupMap[groups[gIdx].length > 0 ? groups[gIdx][0] : -1];
  if (currentGroup !== undefined) {
    trySnapGroupToFrame(currentGroup);
    // after snap, try merge again (might now align with placed pieces)
    tryMergeNeighbors(currentGroup);
  }

  draw();
  checkWin();
}

// mouse events
canvas.addEventListener("mousedown", (e) => {
  startDrag(getMousePos(e));
});

canvas.addEventListener("mousemove", (e) => {
  moveDrag(getMousePos(e));
});

canvas.addEventListener("mouseup", () => endDrag());

canvas.addEventListener("mouseleave", () => {
  if (draggingGroup !== null) {
    draggingGroup = null;
    draw();
  }
});

// touch events
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  startDrag(getMousePos(e.touches[0]));
}, { passive: false });

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  moveDrag(getMousePos(e.touches[0]));
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
  e.preventDefault();
  endDrag();
}, { passive: false });

function checkWin() {
  if (pieces.every(p => p.placed)) {
    solved = true;
    statusEl.textContent = "Puzzle Complete!";
    setTimeout(showCelebration, 500);
  } else {
    const placed = pieces.filter(p => p.placed).length;
    statusEl.textContent = `${placed} / ${pieces.length} pieces placed`;
  }
}

// ---- FIREWORKS ----
const fwCanvas = document.getElementById("fireworks-canvas");
const fwCtx = fwCanvas.getContext("2d");
let fireworks = [];
let fwParticles = [];
let fwAnimId = null;

function resizeFwCanvas() {
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}

class Firework {
  constructor() {
    this.x = Math.random() * fwCanvas.width;
    this.y = fwCanvas.height;
    this.targetY = Math.random() * fwCanvas.height * 0.5;
    this.speed = 4 + Math.random() * 4;
    this.hue = Math.random() * 360;
    this.alive = true;
  }
  update() {
    this.y -= this.speed;
    if (this.y <= this.targetY) {
      this.alive = false;
      explode(this.x, this.y, this.hue);
    }
  }
  draw() {
    fwCtx.beginPath();
    fwCtx.arc(this.x, this.y, 3, 0, Math.PI * 2);
    fwCtx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
    fwCtx.fill();
  }
}

function explode(x, y, hue) {
  const count = 60 + Math.floor(Math.random() * 40);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 5;
    fwParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      hue: hue + Math.random() * 40 - 20,
      size: 1.5 + Math.random() * 2
    });
  }
}

function animateFireworks() {
  fwCtx.globalCompositeOperation = "destination-out";
  fwCtx.fillStyle = "rgba(0,0,0,0.15)";
  fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
  fwCtx.globalCompositeOperation = "lighter";

  if (Math.random() < 0.15) fireworks.push(new Firework());

  fireworks = fireworks.filter(f => f.alive);
  for (const f of fireworks) { f.update(); f.draw(); }

  fwParticles = fwParticles.filter(p => p.alpha > 0.01);
  for (const p of fwParticles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.04;
    p.alpha -= 0.012;
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    fwCtx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${p.alpha})`;
    fwCtx.fill();
  }

  fwAnimId = requestAnimationFrame(animateFireworks);
}

function showCelebration() {
  resizeFwCanvas();
  fwCanvas.style.display = "block";
  fireworks = [];
  fwParticles = [];
  animateFireworks();

  const reveal = document.getElementById("reveal");
  const puzzleRevealImg = document.getElementById("reveal-puzzle");
  const finalRevealImg = document.getElementById("reveal-final");

  reveal.classList.add("active");

  // puzzle image appears quickly — user admires completed work
  setTimeout(() => {
    puzzleRevealImg.classList.add("visible");
  }, 200);

  // quick surprise — real photo crossfades in after just 2 seconds
  setTimeout(() => {
    puzzleRevealImg.style.transition = "opacity 3s ease-in-out";
    puzzleRevealImg.style.opacity = "0";
    finalRevealImg.classList.add("visible");
  }, 2000);

  setTimeout(() => {
    if (fwAnimId) cancelAnimationFrame(fwAnimId);
    fwCanvas.style.display = "none";
  }, 10000);
}

function resetReveal() {
  const reveal = document.getElementById("reveal");
  reveal.classList.remove("active");
  document.getElementById("reveal-puzzle").classList.remove("visible");
  document.getElementById("reveal-puzzle").style.opacity = "";
  document.getElementById("reveal-puzzle").style.transition = "";
  document.getElementById("reveal-final").classList.remove("visible");
  if (fwAnimId) { cancelAnimationFrame(fwAnimId); fwAnimId = null; }
  fwCanvas.style.display = "none";
}

function showGame() {
  startScreen.classList.add("hidden");
  gameWrapper.classList.add("active");
  resetReveal();
  initPuzzle();
}

function showStart() {
  resetReveal();
  gameWrapper.classList.remove("active");
  startScreen.classList.remove("hidden");
}

playBtn.addEventListener("click", showGame);
restartBtn.addEventListener("click", showStart);

// preload images
puzzleImg = new Image();
puzzleImg.src = PUZZLE_IMG_SRC;
const preloadReveal = new Image();
preloadReveal.src = REVEAL_IMG_SRC;
</script>

</body>
</html>
